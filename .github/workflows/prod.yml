name: Prod — Deploy to production

on:
  push:
    branches: [main]

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build, test, and deploy to production
    runs-on: [self-hosted, marketer]
    timeout-minutes: 25
    steps:
      - name: Git auth
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
        run: |
          git config --global --replace-all credential.helper ""
          [ -n "${CI_TOKEN}" ] && git config --global url."https://x-access-token:${CI_TOKEN}@github.com/".insteadOf "https://github.com/"

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_TOKEN || secrets.GITHUB_TOKEN }}
        timeout-minutes: 5

      - name: Install pnpm + deps
        run: |
          export PATH="/opt/homebrew/opt/node@22/bin:/opt/homebrew/bin:$PATH"
          command -v pnpm >/dev/null 2>&1 || npm install -g pnpm
          pnpm install --frozen-lockfile

      - name: Lint + build + test
        run: |
          export PATH="/opt/homebrew/opt/node@22/bin:/opt/homebrew/bin:$PATH"
          pnpm lint
          pnpm build
          pnpm exec playwright install chromium
          pnpm test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-prod
          path: playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-prod
          path: tests/screenshots/

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_II_PACKAGE }}
          projectId: ii-package
          target: prod
          channelId: live
